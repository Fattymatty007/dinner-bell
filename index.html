<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/bell.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#2B2E27" />
    <meta name="description" content="Weekly dinner picker and grocery list" />
    <!-- iOS home-screen app -->
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Dinner Bell" />
    <title>Dinner Bell</title>
    <script>
      // Capture Chrome's install prompt as early as possible — it can fire
      // before the React app mounts, and if we miss it the in-app Install
      // button never appears.
      (function () {
        window.__deferredInstallPrompt = null;
        window.addEventListener('beforeinstallprompt', function (e) {
          e.preventDefault();
          window.__deferredInstallPrompt = e;
          window.dispatchEvent(new CustomEvent('pwa-install-available'));
        });
        window.addEventListener('appinstalled', function () {
          window.__deferredInstallPrompt = null;
          window.dispatchEvent(new CustomEvent('pwa-installed'));
        });
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
